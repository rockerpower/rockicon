<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { overflow: hidden; }
  ::selection { background: var(--ink); color: var(--bg); }

  .app-root {
    --bg: #0a0a0b; --bg-2: #0d0d0f; --bg-3: #1a1a1d; --field: #0e0e10;
    --line: rgba(255,255,255,.085); --line-2: rgba(255,255,255,.15);
    --ink: rgba(255,255,255,.92); --ink-2: rgba(255,255,255,.52); --ink-3: rgba(255,255,255,.32);
    --inv-bg: #f3f3f0; --inv-ink: #0a0a0b;
  }
  .app-root.light {
    --bg: #f6f6f3; --bg-2: #fbfbf9; --bg-3: #eeeeea; --field: #ffffff;
    --line: rgba(0,0,0,.10); --line-2: rgba(0,0,0,.17);
    --ink: #17171a; --ink-2: rgba(0,0,0,.55); --ink-3: rgba(0,0,0,.34);
    --inv-bg: #17171a; --inv-ink: #fafafa;
  }
  .app-root *::-webkit-scrollbar { width: 10px; height: 10px; }
  .app-root *::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 10px; border: 3px solid transparent; background-clip: content-box; }
  .app-root *::-webkit-scrollbar-track { background: transparent; }

  input[type="range"] { width: 100%; accent-color: var(--ink); }
  button { font-family: 'Geist', system-ui, sans-serif; }

  @keyframes panelIn { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes toastIn { from { transform: translateY(12px) translateX(-50%); opacity: 0; } to { transform: translateY(0) translateX(-50%); opacity: 1; } }

  .panel-anim { animation: panelIn .26s cubic-bezier(.2,.8,.2,1); }
  .toast-anim { animation: toastIn .22s ease; }

  .icon-cell:hover { background: var(--bg-3) !important; }
  .tree-row:hover { background: var(--bg-3) !important; }
  .nav-btn:hover { opacity: .8; }

  /* Pro plan */
  .app-root { --pro: #7C6AE8; --pro-2: #A99DF0; --pro-bg: rgba(124,106,232,.12); }
  .app-root.light { --pro: #5B48D9; --pro-2: #7C6AE8; --pro-bg: rgba(91,72,217,.10); }
  @keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }
  .pro-badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 7px; border-radius: 5px; font-size: 9.5px; font-weight: 700;
    font-family: 'Geist Mono', monospace; letter-spacing: .08em; text-transform: uppercase;
    background: var(--pro-bg); color: var(--pro); border: 1px solid rgba(124,106,232,.25);
    line-height: 1.4; flex-shrink: 0;
  }
  .pro-lock-overlay {
    position: absolute; inset: 0; border-radius: inherit;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.42); opacity: 0; transition: opacity .15s; cursor: pointer;
    backdrop-filter: blur(1px);
  }
  .pro-wrap { position: relative; }
  .pro-wrap:hover .pro-lock-overlay { opacity: 1; }
</style>
</head>

/* ── SVG helpers ── */
function svgAttrs(style, size, sw) {
  if (style === 'solid') return { fill: 'currentColor', stroke: 'none' };
  if (style === 'duotone') return { fill: 'none', stroke: 'none' };
  return { fill: 'none', stroke: 'currentColor', strokeWidth: sw, strokeLinecap: 'round', strokeLinejoin: 'round' };
}

function SvgIcon({ body, style = 'outline', size = 24, sw = 2, color }) {
  const attrs = svgAttrs(style, size, sw);
  const inner = style === 'duotone'
    ? `<g fill="currentColor" stroke="none" opacity="0.26">${body}</g><g fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${body}</g>`
    : body;
  return h('svg', {
    xmlns: 'http://www.w3.org/2000/svg',
    width: size, height: size,
    viewBox: '0 0 24 24',
    style: { display: 'block', flexShrink: 0, color: color || undefined },
    ...attrs,
    dangerouslySetInnerHTML: { __html: inner },
  });
}

function markupStr(icon, style, size, sw, color) {
  const c = color || 'currentColor';
  const head = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24"`;
  if (style === 'solid') return `${head} fill="${c}">${icon.body}</svg>`;
  if (style === 'duotone') return `${head}><g fill="${c}" opacity="0.26">${icon.body}</g><g fill="none" stroke="${c}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${icon.body}</g></svg>`;
  return `${head} fill="none" stroke="${c}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${icon.body}</svg>`;
}

function styleAvail(icon) { return icon.fill ? ['outline', 'solid', 'duotone'] : ['outline']; }
function gridStyleFor(icon, navStyle) { return (navStyle === 'solid' && icon.fill) ? 'solid' : 'outline'; }

function pascal(name) {
  return name.replace(/[^a-z0-9 ]/gi,'').split(/[ -]+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
}
function toJsx(mk, name) {
  let s = mk
    .replace(/stroke-width/g,'strokeWidth').replace(/stroke-linecap/g,'strokeLinecap')
    .replace(/stroke-linejoin/g,'strokeLinejoin').replace(/fill-rule/g,'fillRule')
    .replace(/clip-rule/g,'clipRule').replace(/xmlns="[^"]*"\s*/,'');
  s = s.replace('<svg', '<svg {...props}');
  return `export const ${pascal(name)}Icon = (props) => (\n  ${s.replace(/></g,'>\n    <').replace('</svg>','\n  </svg>')}\n);`;
}

/* ── Clipboard / download ── */
function copyText(text) {
  try { navigator.clipboard.writeText(text); } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  }
}
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}
function exportPng(icon, style, size, sw, color) {
  const px = Math.max(size, 64);
  const mk = markupStr(icon, style, 24, sw, color);
  const img = new Image();
  img.onload = () => {
    const cv = document.createElement('canvas'); cv.width = px; cv.height = px;
    cv.getContext('2d').drawImage(img, 0, 0, px, px);
    cv.toBlob(b => downloadBlob(b, icon.name.replace(/\s+/g,'-') + '-' + px + '.png'), 'image/png');
  };
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(mk);
}

/* ── Auth modal (defined outside App to keep stable component identity) ── */
function AuthModal({ authView, authName, authEmail, authPw, authErr, setAuthView, setAuthName, setAuthEmail, setAuthPw, setAuthErr, setSignedIn, showToast }) {
  if (!authView) return null;
  const isReg = authView === 'register';
  const decoIds = ['home','search','heart','star','settings','bell','camera','globe','folder','cart','sun','shield'];

  function signInWithGoogle() {
    setSignedIn(true);
    if (!authEmail) setAuthEmail('you@rockicon.co');
    setAuthView(null); setAuthErr('');
    showToast('Signed in with Google');
  }

  function submitAuth() {
    const emailOk = /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(authEmail.trim());
    if (isReg && !authName.trim()) { setAuthErr('Enter your name.'); return; }
    if (!emailOk) { setAuthErr('Enter a valid email address.'); return; }
    if (authPw.length < 6) { setAuthErr('Password must be at least 6 characters.'); return; }
    setSignedIn(true); setAuthView(null); setAuthPw(''); setAuthErr('');
    showToast(isReg ? 'Account created — welcome to Rockicon' : 'Signed in as ' + authEmail.trim());
  }

  return h('div', {
    style: { position: 'fixed', inset: 0, zIndex: 100, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px', background: 'rgba(0,0,0,.62)', backdropFilter: 'blur(6px)', WebkitBackdropFilter: 'blur(6px)' }
  },
    h('div', { style: { position: 'relative', display: 'flex', width: '100%', maxWidth: '880px', height: '560px', maxHeight: '92vh', background: 'var(--bg)', border: '1px solid var(--line-2)', borderRadius: '18px', overflow: 'hidden', boxShadow: '0 40px 120px rgba(0,0,0,.55)' } },
      h('div', { style: { flex: '0 0 42%', display: 'flex', flexDirection: 'column', justifyContent: 'space-between', padding: '36px 34px', background: 'var(--bg-3)', borderRight: '1px solid var(--line)', position: 'relative', overflow: 'hidden' } },
        h('div', { style: { position: 'absolute', right: '-40px', bottom: '-30px', display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: '18px', opacity: .10, color: 'var(--ink)', pointerEvents: 'none' } },

        ),

        ),
        h('div', { style: { position: 'relative' } },

        h('div', { style: { display: 'flex', justifyContent: 'flex-end' } },

            h(SvgIcon, { body: '<path d="M6 6l12 12"/><path d="M18 6 6 18"/>', size: 16, sw: 2, color: 'var(--ink-2)' })
          )
        ),
        h('div', { style: { marginTop: '6px' } },
          h('h2', { style: { margin: 0, fontFamily: "'Geist',sans-serif", fontWeight: 600, fontSize: '27px', letterSpacing: '-.02em', lineHeight: 1.1 } }, isReg ? 'Create your account' : 'Welcome back'),
          h('p', { style: { margin: '9px 0 0', fontSize: '14px', lineHeight: 1.5, color: 'var(--ink-2)' } }, isReg ? 'Start curating and exporting the Rockicon set.' : 'Sign in to manage and export your icon library.')
        ),
        h('button', {
          onClick: signInWithGoogle,
          style: { marginTop: '24px', height: '46px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '10px', background: 'transparent', color: 'var(--ink)', border: '1px solid var(--line-2)', borderRadius: '11px', fontFamily: "'Geist',sans-serif", fontSize: '14px', fontWeight: 600, cursor: 'pointer' }
        },
          h(SvgIcon, { body: '<path d="M21 12.2c0-.7-.1-1.3-.2-1.9H12v3.8h5.1a4.4 4.4 0 0 1-1.9 2.9v2.4h3.1c1.8-1.7 2.7-4.1 2.7-7.2z"/><path d="M12 21c2.4 0 4.5-.8 6-2.2l-3.1-2.4c-.8.6-2 1-2.9 1a5 5 0 0 1-4.7-3.5H4.1v2.4A9 9 0 0 0 12 21z"/><path d="M7.3 13.9a5.3 5.3 0 0 1 0-3.4V8.1H4.1a9 9 0 0 0 0 8.2z"/><path d="M12 7.6c1.3 0 2.5.5 3.5 1.4l2.6-2.6A9 9 0 0 0 4.1 8.1l3.2 2.4A5 5 0 0 1 12 7.6z"/>', style: 'solid', size: 18, sw: 2 }),
          'Continue with Google'
        ),
        h('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', margin: '20px 0' } },
          h('span', { style: { flex: 1, height: '1px', background: 'var(--line)' } }),
          h('span', { style: { fontFamily: "'Geist Mono',monospace", fontSize: '10px', letterSpacing: '.14em', textTransform: 'uppercase', color: 'var(--ink-3)' } }, 'or'),
          h('span', { style: { flex: 1, height: '1px', background: 'var(--line)' } })
        ),
        h('div', { style: { display: 'flex', flexDirection: 'column', gap: '13px' } },
          isReg && h('label', { style: { display: 'flex', flexDirection: 'column', gap: '7px' } },
            h('span', { style: { fontFamily: "'Geist Mono',monospace", fontSize: '10px', letterSpacing: '.14em', textTransform: 'uppercase', color: 'var(--ink-3)' } }, 'Full name'),
            h('input', { value: authName, onInput: e => setAuthName(e.target.value), placeholder: 'Jane Mercer', spellCheck: false, style: { height: '44px', padding: '0 14px', background: 'var(--field)', border: '1px solid var(--line)', borderRadius: '10px', color: 'var(--ink)', fontFamily: "'Geist',sans-serif", fontSize: '14px', outline: 'none' } })
          ),
          h('label', { style: { display: 'flex', flexDirection: 'column', gap: '7px' } },
            h('span', { style: { fontFamily: "'Geist Mono',monospace", fontSize: '10px', letterSpacing: '.14em', textTransform: 'uppercase', color: 'var(--ink-3)' } }, 'Email'),
            h('input', { value: authEmail, onInput: e => setAuthEmail(e.target.value), type: 'email', placeholder: 'you@studio.co', spellCheck: false, style: { height: '44px', padding: '0 14px', background: 'var(--field)', border: '1px solid var(--line)', borderRadius: '10px', color: 'var(--ink)', fontFamily: "'Geist',sans-serif", fontSize: '14px', outline: 'none' } })
          ),
          h('label', { style: { display: 'flex', flexDirection: 'column', gap: '7px' } },
            h('span', { style: { fontFamily: "'Geist Mono',monospace", fontSize: '10px', letterSpacing: '.14em', textTransform: 'uppercase', color: 'var(--ink-3)' } }, 'Password'),
            h('input', { value: authPw, onInput: e => setAuthPw(e.target.value), type: 'password', placeholder: '••••••••', style: { height: '44px', padding: '0 14px', background: 'var(--field)', border: '1px solid var(--line)', borderRadius: '10px', color: 'var(--ink)', fontFamily: "'Geist',sans-serif", fontSize: '14px', outline: 'none' } })
          ),
          !isReg && h('button', { onClick: () => showToast('Password reset link sent'), style: { alignSelf: 'flex-end', background: 'transparent', border: 'none', padding: 0, color: 'var(--ink-2)', fontSize: '12.5px', cursor: 'pointer', textDecoration: 'underline', textUnderlineOffset: '3px' } }, 'Forgot password?')
        ),
        authErr && h('div', { style: { marginTop: '14px', fontSize: '13px', background: 'var(--bg-3)', border: '1px solid var(--line-2)', borderRadius: '9px', padding: '10px 13px' } }, authErr),
        h('button', {
          onClick: submitAuth,
          style: { marginTop: '20px', height: '48px', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--inv-bg)', color: 'var(--inv-ink)', border: 'none', borderRadius: '12px', fontFamily: "'Geist',sans-serif", fontSize: '14.5px', fontWeight: 600, cursor: 'pointer' }
        }, isReg ? 'Create account' : 'Sign in'),
        h('div', { style: { marginTop: '18px', textAlign: 'center', fontSize: '13px', color: 'var(--ink-2)' } },
          isReg ? 'Already have an account?' : 'New to Rockicon?',
          h('button', {
            onClick: () => { setAuthView(isReg ? 'login' : 'register'); setAuthErr(''); },
            style: { background: 'transparent', border: 'none', padding: '0 0 0 4px', color: 'var(--ink)', fontSize: '13px', fontWeight: 600, cursor: 'pointer', textDecoration: 'underline', textUnderlineOffset: '3px' }
          }, isReg ? 'Sign in' : 'Create one')
        )
      )
    )
  );
}

/* ── Main App ── */
function App() {
  const [theme, setTheme] = useState('dark');
  const [density, setDensity] = useState(28);
  const [search, setSearch] = useState('');
  const [searchAllStyles, setSearchAllStyles] = useState(false);
  const [navStyle, setNavStyle] = useState('outline');
  const [cat, setCat] = useState(CATS[0]);
  const [expanded, setExpanded] = useState({ 't:rockicon': true, 's:outline': true });
  const [selectedId, setSelectedId] = useState(null);
  const [openStyle, setOpenStyle] = useState('outline');
  const [size, setSize] = useState(48);
  const [stroke, setStroke] = useState(2);
  const [color, setColor] = useState(null);
  const [selectionMode, setSelectionMode] = useState(false);
  const [sel, setSel] = useState({});
  const [toast, setToast] = useState('');
  const [config, setConfig] = useState(CONFIG);
  const [iconEdits, setIconEdits] = useState({});
  const [authorTab, setAuthorTab] = useState('meta');
  const proSet = new Set(config.proIconIds);
  const [entitled, setEntitled] = useState(false);
  const [route, setRoute] = useState('browse'); // 'browse' | 'pricing' | 'account' | 'author'
  const [billing, setBilling] = useState('yearly');
  const [authView, setAuthView] = useState(null);
  const [signedIn, setSignedIn] = useState(false);
  const [authName, setAuthName] = useState('');
  const [authEmail, setAuthEmail] = useState('');
  const [authPw, setAuthPw] = useState('');
  const [authErr, setAuthErr] = useState('');
  const toastTimerRef = useRef(null);

  const defaultColor = () => theme === 'light' ? '#17171A' : '#EDEDEA';
  const curColor = color || defaultColor();

  function showToast(msg) {
    setToast(msg);
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    toastTimerRef.current = setTimeout(() => setToast(''), 1700);
  }

  function doCopy(text, label) { copyText(text); showToast(label); }

  useEffect(() => {
    function onKey(e) {
      if (e.key === 'Escape') {
        if (authView) setAuthView(null);
        else if (route !== 'browse') setRoute('browse');
        else setSelectedId(null);
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [authView, route]);

  function toggle(key, forceOpen) {
    setExpanded(prev => ({ ...prev, [key]: forceOpen ? true : !prev[key] }));
  }

  const searchMode = search.trim().length > 0;
  const q = search.trim().toLowerCase();

  function catList() {
    if (cat === '__all__') return ICONS.slice();
    return ICONS.filter(ic => ic.cat === cat);
  }

  function searchList() {
    const terms = q.split(/\s+/);
    return ICONS.filter(ic => {
      const hay = (ic.name + ' ' + ic.cat + ' ' + ic.sub + ' ' + ic.tags.join(' ')).toLowerCase();
      return terms.every(t => hay.indexOf(t) >= 0);
    });
  }

  function openIcon(id) {
    const ic = ICONS.find(x => x.id === id);
    const avail = styleAvail(ic);
    const os = (navStyle === 'solid' && avail.includes('solid')) ? 'solid' : 'outline';
    setSelectedId(id);
    setOpenStyle(os);
    if (!color) setColor(defaultColor());
  }

  function toggleSel(id) {
    setSel(prev => { const s = { ...prev }; if (s[id]) delete s[id]; else s[id] = true; return s; });
  }

  function submitAuth(isReg) {
    const emailOk = /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(authEmail.trim());
    if (isReg && !authName.trim()) { setAuthErr('Enter your name.'); return; }
    if (!emailOk) { setAuthErr('Enter a valid email address.'); return; }
    if (authPw.length < 6) { setAuthErr('Password must be at least 6 characters.'); return; }
    setSignedIn(true); setAuthView(null); setAuthPw(''); setAuthErr('');
    showToast(isReg ? 'Account created — welcome to Rockicon' : 'Signed in as ' + authEmail.trim());
  }

  function exportZip() {
    const ids = Object.keys(sel);
    let icons = ids.length ? ICONS.filter(i => ids.includes(i.id)) : [];
    if (!icons.length) { showToast('Select icons first'); return; }
    if (typeof JSZip === 'undefined') { showToast('ZIP library loading…'); return; }
    const lockedN = icons.filter(i => proSet.has(i.id)).length;
    if (lockedN && !entitled && !IS_PROD) {
      icons = icons.filter(i => !proSet.has(i.id));
      if (!icons.length) { showToast('Upgrade to Pro to export Pro icons'); return; }
    }
    const zip = new JSZip();
    icons.forEach(i => {
      const stl = gridStyleFor(i, navStyle);
      zip.file(i.name.replace(/\s+/g,'-') + '.svg', markupStr(i, stl, 24, 2, 'currentColor'));
    });
    zip.generateAsync({ type: 'blob' }).then(blob => {
      downloadBlob(blob, 'rockicon-icons.zip');
      showToast('Exported ' + icons.length + ' icons' + (lockedN && !entitled && !IS_PROD ? ' (Pro icons skipped)' : ''));
    });
  }

  function copyJson() {
    const ids = Object.keys(sel);
    const base = ids.length ? ICONS.filter(i => ids.includes(i.id)) : (searchMode ? searchList() : catList());
    const data = base.map(i => ({ id: i.id, typeId: 'rockicon', name: i.name, category: i.cat, subcategory: i.sub, tags: i.tags, styles: styleAvail(i) }));
    doCopy(JSON.stringify(data, null, 2), 'Copied ' + data.length + ' icons as JSON');
  }

  /* ── icon grid helpers ── */
  const box = density === 24 ? 78 : density === 28 ? 92 : 106;

  function CellItem({ ic }) {
    const checked = !!sel[ic.id];
    const gs = gridStyleFor(ic, navStyle);
    const isProIcon = proSet.has(ic.id);
    const locked = isProIcon && !entitled && !IS_PROD;
    function handleClick() {
      if (selectionMode) toggleSel(ic.id);
      else openIcon(ic.id);
    }
    return h('div', {
      onClick: handleClick,
      title: ic.name,
      className: 'icon-cell',
      style: {
        position: 'relative', display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
        padding: '14px 8px', minHeight: box + 'px',
        borderRadius: '12px', cursor: 'pointer', transition: 'background .12s,border-color .12s',
        border: '1px solid ' + (checked ? 'var(--line-2)' : 'transparent'),
        background: (checked || selectedId === ic.id) ? 'var(--bg-3)' : 'transparent',
        opacity: locked ? 0.62 : 1,
      }
    },
      selectionMode && h('span', {
        style: {
          position: 'absolute', top: '8px', left: '8px',
          height: '18px', width: '18px', display: 'flex', alignItems: 'center', justifyContent: 'center',
          borderRadius: '5px', fontSize: '11px', fontWeight: 700,
          border: '1px solid ' + (checked ? 'transparent' : 'var(--line-2)'),
          background: checked ? 'var(--inv-bg)' : 'transparent',
          color: 'var(--inv-ink)',
        }
      }, checked ? '✓' : ''),
      locked && h('span', {
        style: {
          position: 'absolute', top: '7px', right: '7px',
          height: '16px', width: '16px', display: 'flex', alignItems: 'center', justifyContent: 'center',
          borderRadius: '4px', background: 'var(--bg-3)', border: '1px solid var(--line-2)',
        }
      }, h(SvgIcon, { body: '<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>', size: 10, sw: 2, color: 'var(--ink-3)' })),
      h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', height: density + 'px', color: 'var(--ink)' } },
        h(SvgIcon, { body: ic.body, style: gs, size: density, sw: 2 })
      ),
      h('div', {
        style: {
          marginTop: '9px', width: '100%', textAlign: 'center',
          fontFamily: "'Geist Mono',monospace", fontSize: '9px', letterSpacing: '.01em',
          color: 'var(--ink-3)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
        }
      }, ic.name)
    );
  }

  /* ── Density buttons ── */
  function DensityBtns() {
    return h('div', { style: { display: 'flex', border: '1px solid var(--line)', borderRadius: '9px', overflow: 'hidden' } },
      [24, 28, 32].map((val, i) =>
        h('button', {
          key: val,
          onClick: () => setDensity(val),
          title: val + 'px',
          style: {
            height: '34px', width: '38px', display: 'flex', alignItems: 'center', justifyContent: 'center',
            background: density === val ? 'var(--bg-3)' : 'transparent',
            color: density === val ? 'var(--ink)' : 'var(--ink-3)',
            border: 'none', borderRight: i < 2 ? '1px solid var(--line)' : 'none',
            fontFamily: "'Geist Mono',monospace", fontSize: '11px', fontWeight: 600, cursor: 'pointer',
          }
        }, val)
      )
    );
  }

  /* ── Sidebar tree ── */
  function Sidebar() {
    const STYLES = [{ id: 'outline', name: 'Outline' }, { id: 'solid', name: 'Solid' }];
    const typeKey = 't:rockicon';
    const typeOpen = !!expanded[typeKey];

    const rows = [];

    rows.push(h('div', {
      key: typeKey,
      className: 'tree-row',
      onClick: () => toggle(typeKey),
      style: { display: 'flex', alignItems: 'center', gap: '4px', height: '30px', padding: '0 8px 0 6px', borderRadius: '7px', cursor: 'pointer' }
    },
      h('span', { style: { flex: '0 0 auto', width: '16px', textAlign: 'center', fontSize: '9px', color: 'var(--ink-2)' } }, typeOpen ? '▾' : '▸'),
      h('span', { style: { fontSize: '13.5px', fontWeight: 700, color: 'var(--ink)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, 'Rockicon')
    ));

    if (typeOpen) {
      STYLES.forEach(sd => {
        const sKey = 's:' + sd.id;
        const sOpen = !!expanded[sKey];
        const sActive = navStyle === sd.id && !searchMode;
        rows.push(h('div', {
          key: sKey,
          className: 'tree-row',
          onClick: () => { setNavStyle(sd.id); setSearch(''); toggle(sKey, true); },
          style: { display: 'flex', alignItems: 'center', gap: '4px', height: '28px', padding: '0 8px 0 18px', borderRadius: '7px', cursor: 'pointer' }
        },
          h('span', {
            onClick: e => { e.stopPropagation(); toggle(sKey); },
            style: { flex: '0 0 auto', width: '16px', textAlign: 'center', fontSize: '9px', color: 'var(--ink-3)', cursor: 'pointer' }
          }, sOpen ? '▾' : '▸'),
          h('span', { style: { fontSize: '12.5px', fontWeight: sActive ? 600 : 500, color: sActive ? 'var(--ink)' : 'var(--ink-2)', whiteSpace: 'nowrap' } },
            sd.name
          )
        ));

        if (sOpen) {
          const allActive = !searchMode && navStyle === sd.id && cat === '__all__';
          rows.push(h('div', {
            key: 'all:' + sd.id,
            className: 'tree-row',
            onClick: () => { setNavStyle(sd.id); setCat('__all__'); setSearch(''); },
            style: { display: 'flex', alignItems: 'center', gap: '4px', height: '28px', padding: '0 8px 0 36px', borderRadius: '7px', cursor: 'pointer', background: allActive ? 'var(--bg-3)' : 'transparent' }
          },
            h('span', { style: { flex: '0 0 auto', width: '12px' } }),
            h('span', { style: { flex: '0 0 auto', width: '4px', height: '4px', borderRadius: '50%', background: allActive ? 'var(--ink)' : 'transparent', border: '1px solid ' + (allActive ? 'var(--ink)' : 'var(--line-2)'), marginRight: '4px' } }),
            h('span', { style: { fontSize: '12.5px', fontWeight: allActive ? 700 : 600, color: allActive ? 'var(--ink)' : 'var(--ink-2)', whiteSpace: 'nowrap' } }, 'All')
          ));

          CATS.forEach(c => {
            const active = !searchMode && navStyle === sd.id && cat === c;
            rows.push(h('div', {
              key: 'c:' + sd.id + ':' + c,
              className: 'tree-row',
              onClick: () => { setNavStyle(sd.id); setCat(c); setSearch(''); },
              style: { display: 'flex', alignItems: 'center', gap: '4px', height: '28px', padding: '0 8px 0 36px', borderRadius: '7px', cursor: 'pointer', background: active ? 'var(--bg-3)' : 'transparent' }
            },
              h('span', { style: { flex: '0 0 auto', width: '12px' } }),
              h('span', { style: { flex: '0 0 auto', width: '4px', height: '4px', borderRadius: '50%', background: active ? 'var(--ink)' : 'var(--line-2)', marginRight: '4px' } }),
              h('span', { style: { fontSize: '12.5px', fontWeight: active ? 600 : 500, color: active ? 'var(--ink)' : 'var(--ink-2)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, c)
            ));
          });
        }
      });
    }

    return h('aside', {
      style: { flex: '0 0 228px', borderRight: '1px solid var(--line)', display: 'flex', flexDirection: 'column', background: 'var(--bg)' }
    },
      h('div', { style: { flex: 1, overflowY: 'auto', padding: '10px 8px 40px' } },
        h('div', { style: { fontFamily: "'Geist Mono',monospace", fontSize: '9px', letterSpacing: '.18em', textTransform: 'uppercase', color: 'var(--ink-3)', padding: '8px 8px 7px' } }, 'Library'),
        ...rows
      )
    );
  }

  /* ── Browse grid ── */
  function BrowseGrid() {
    const isAll = cat === '__all__';
    const catIcons = catList();
    const styleName = navStyle === 'solid' ? 'Solid' : 'Outline';
    const gridStyle = { display: 'grid', gridTemplateColumns: `repeat(auto-fill, minmax(${box}px, 1fr))`, gap: '6px', alignContent: 'start' };

    let sections;
    if (isAll) {
      sections = CATS.map(c => ({ name: c, items: catIcons.filter(ic => ic.cat === c) }));
    } else {
      const subs = SUBS[cat] || [];
      sections = subs.map(sub => ({ name: sub, items: catIcons.filter(ic => ic.sub === sub) }));
    }

    const mkCrumb = (label, onClick, active) => ({
      label, onClick, active,
      style: { background: 'transparent', border: 'none', padding: '0', cursor: onClick ? 'pointer' : 'default', fontFamily: "'Geist Mono',monospace", fontSize: '11.5px', letterSpacing: '.04em', textTransform: 'uppercase', fontWeight: active ? 700 : 500, color: active ? 'var(--ink)' : 'var(--ink-3)' }
    });
    const crumbs = [
      mkCrumb('Icons', null, false),
      mkCrumb('Rockicon', () => setExpanded(prev => ({ ...prev, 't:rockicon': true })), false),
      mkCrumb(styleName, null, false),
      mkCrumb(isAll ? 'All' : cat, null, true),
    ];

    return h('div', { style: { display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0 } },
      h('div', { style: { flexShrink: 0, padding: '24px 30px 0' } },
        h('div', { style: { display: 'flex', alignItems: 'center', gap: '7px', flexWrap: 'wrap', marginBottom: '14px' } },
          crumbs.map((c, i) => [
            h('button', { key: 'cb' + i, onClick: c.onClick || undefined, style: c.style }, c.label),
            i < crumbs.length - 1 && h('span', { key: 'cs' + i, style: { color: 'var(--ink-3)', fontSize: '12px' } }, '›'),
          ])
        ),
        h('h1', { style: { margin: 0, fontFamily: "'Geist',sans-serif", fontWeight: 500, fontSize: '38px', letterSpacing: '-.02em', lineHeight: 1 } }, isAll ? 'All Icons' : cat),
